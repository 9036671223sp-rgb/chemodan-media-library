name: Publish CHEMODAN media library
# direct-id-preflight-after-key-rotation: 2026-07-15T00:03:00Z

on:
  push:
    branches:
      - main
    paths:
      - CHEMODAN_MEDIA_LIBRARY_V3_PUBLIC.zip
      - .github/workflows/publish-media.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  n8n_preflight:
    runs-on: ubuntu-latest
    env:
      N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
      N8N_HEALTH_URL: https://hot-tours-bot.app.n8n.cloud/healthz
      N8N_API_URL: https://hot-tours-bot.app.n8n.cloud/api/v1/workflows/1MagZs46gwN9Q0rZ
    steps:
      - uses: actions/checkout@v4
      - name: Verify direct n8n workflow ID
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p automation-results
          if [ -z "${N8N_API_KEY:-}" ]; then
            printf '%s\n' '{"status":"FAIL","operation":"DIRECT_ID_READ_ONLY_PREFLIGHT","error":"N8N_API_KEY secret is empty or unavailable"}' > automation-results/n8n-preflight.json
            exit 1
          fi
          health_code="$(curl --http1.1 --silent --show-error --location --retry 3 --retry-all-errors --retry-delay 3 --connect-timeout 20 --max-time 60 -A 'CHEMODAN-SAFE-DIRECT-ID/1.0' -o /tmp/health.txt -w '%{http_code}' "${N8N_HEALTH_URL}" || true)"
          api_code="$(curl --http1.1 --silent --show-error --location --retry 3 --retry-all-errors --retry-delay 3 --connect-timeout 20 --max-time 90 -A 'CHEMODAN-SAFE-DIRECT-ID/1.0' -H "X-N8N-API-KEY: ${N8N_API_KEY}" -H 'Accept: application/json' -o /tmp/n8n.json -w '%{http_code}' "${N8N_API_URL}" || true)"
          python3 - "$health_code" "$api_code" <<'PY'
          import json,sys
          health_code,api_code=sys.argv[1],sys.argv[2]
          try:
              workflow=json.load(open('/tmp/n8n.json',encoding='utf-8'))
          except Exception:
              workflow={}
          types=[str(n.get('type','')).lower() for n in workflow.get('nodes',[])] if api_code=='200' else []
          report={
            'status':'PASS' if health_code=='200' and api_code=='200' and workflow.get('active') is False and len(workflow.get('nodes',[]))==44 and sum('scheduletrigger' in t for t in types)==0 and sum('webhook' in t for t in types)==0 else 'FAIL',
            'operation':'DIRECT_ID_READ_ONLY_PREFLIGHT',
            'health_http_code':health_code,
            'api_http_code':api_code,
            'target_workflow_id':workflow.get('id'),
            'target_workflow_name':workflow.get('name'),
            'target_active':workflow.get('active'),
            'node_count':len(workflow.get('nodes',[])) if isinstance(workflow,dict) else 0,
            'schedule_trigger_count':sum('scheduletrigger' in t for t in types),
            'webhook_count':sum('webhook' in t for t in types)
          }
          if report['status']!='PASS': report['error']='Direct ID safety contract not satisfied'
          open('automation-results/n8n-preflight.json','w',encoding='utf-8').write(json.dumps(report,ensure_ascii=False,indent=2)+'\n')
          if report['status']!='PASS': raise SystemExit(1)
          PY
      - name: Commit direct-ID preflight report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -f automation-results/n8n-preflight.json || exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation-results/n8n-preflight.json
          git diff --cached --quiet && exit 0
          git commit -m "Record direct-ID n8n preflight"
          git push

  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Validate and extract media archive
        shell: bash
        run: |
          set -euo pipefail
          test -f CHEMODAN_MEDIA_LIBRARY_V3_PUBLIC.zip
          unzip -t CHEMODAN_MEDIA_LIBRARY_V3_PUBLIC.zip
          rm -rf public
          mkdir -p public
          unzip -q CHEMODAN_MEDIA_LIBRARY_V3_PUBLIC.zip -d public
          test -d public/CHEMODAN_MEDIA_LIBRARY_V3
          jpg_count="$(find public/CHEMODAN_MEDIA_LIBRARY_V3 -type f -name '*.jpg' | wc -l | tr -d ' ')"
          test "$jpg_count" = "32"
          forbidden_count="$(find public -type f \( -name '*.json' -o -name '*.env' -o -name '*.key' -o -name '*.pem' \) | wc -l | tr -d ' ')"
          test "$forbidden_count" = "0"
          touch public/.nojekyll
      - name: Publish verified files to gh-pages branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd public
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add --all
          git commit -m "Publish verified CHEMODAN media library"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
