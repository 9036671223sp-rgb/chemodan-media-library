name: Publish CHEMODAN media library

on:
  push:
    branches:
      - main
    paths:
      - CHEMODAN_MEDIA_LIBRARY_V3_PUBLIC.zip
      - .github/workflows/publish-media.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  n8n_preflight:
    runs-on: ubuntu-latest
    env:
      N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
      N8N_URL: https://hot-tours-bot.app.n8n.cloud/api/v1/workflows?limit=250
    steps:
      - uses: actions/checkout@v4
      - name: Read workflow list and locate target with retries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p automation-results
          if [ -z "${N8N_API_KEY:-}" ]; then
            printf '%s\n' '{"status":"FAIL","operation":"READ_ONLY_LIST_PREFLIGHT","error":"N8N_API_KEY secret is empty or unavailable"}' > automation-results/n8n-preflight.json
            exit 1
          fi
          python3 - <<'PY'
          import json, os, time, urllib.error, urllib.request
          path='automation-results/n8n-preflight.json'
          last_error=None
          payload=None
          for attempt in range(1,6):
              try:
                  req=urllib.request.Request(os.environ['N8N_URL'],headers={'X-N8N-API-KEY':os.environ['N8N_API_KEY'],'Accept':'application/json'})
                  with urllib.request.urlopen(req,timeout=60) as r: payload=json.load(r)
                  break
              except Exception as exc:
                  last_error=str(exc)
                  if attempt<5: time.sleep(attempt*5)
          if payload is None:
              report={'status':'FAIL','operation':'READ_ONLY_LIST_PREFLIGHT','attempts':5,'error':last_error}
          else:
              items=payload.get('data',[]) if isinstance(payload,dict) else []
              matches=[w for w in items if 'CHEMODAN NEWS V5.3.3 BRANDED MEDIA' in str(w.get('name',''))]
              report={'status':'PASS' if len(matches)==1 else 'FAIL','operation':'READ_ONLY_LIST_PREFLIGHT','attempts_used':attempt,'visible_workflow_count':len(items),'target_match_count':len(matches),'target_workflow_id':matches[0].get('id') if len(matches)==1 else None,'target_workflow_name':matches[0].get('name') if len(matches)==1 else None,'target_active':matches[0].get('active') if len(matches)==1 else None}
              if len(matches)!=1: report['error']='Expected exactly one visible V5.3.3 target workflow'
          open(path,'w',encoding='utf-8').write(json.dumps(report,ensure_ascii=False,indent=2)+'\n')
          if report['status']!='PASS': raise SystemExit(1)
          PY
      - name: Commit preflight report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -f automation-results/n8n-preflight.json || exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation-results/n8n-preflight.json
          git diff --cached --quiet && exit 0
          git commit -m "Record retried n8n workflow visibility preflight"
          git push

  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Validate and extract media archive
        shell: bash
        run: |
          set -euo pipefail
          test -f CHEMODAN_MEDIA_LIBRARY_V3_PUBLIC.zip
          unzip -t CHEMODAN_MEDIA_LIBRARY_V3_PUBLIC.zip
          rm -rf public
          mkdir -p public
          unzip -q CHEMODAN_MEDIA_LIBRARY_V3_PUBLIC.zip -d public
          test -d public/CHEMODAN_MEDIA_LIBRARY_V3
          jpg_count="$(find public/CHEMODAN_MEDIA_LIBRARY_V3 -type f -name '*.jpg' | wc -l | tr -d ' ')"
          test "$jpg_count" = "32"
          forbidden_count="$(find public -type f \( -name '*.json' -o -name '*.env' -o -name '*.key' -o -name '*.pem' \) | wc -l | tr -d ' ')"
          test "$forbidden_count" = "0"
          touch public/.nojekyll
      - name: Publish verified files to gh-pages branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd public
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add --all
          git commit -m "Publish verified CHEMODAN media library"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
