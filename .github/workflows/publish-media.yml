name: Publish CHEMODAN media library

on:
  push:
    branches:
      - main
    paths:
      - CHEMODAN_MEDIA_LIBRARY_V3_PUBLIC.zip
      - .github/workflows/publish-media.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  n8n_preflight:
    runs-on: ubuntu-latest
    env:
      N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
      N8N_URL: https://hot-tours-bot.app.n8n.cloud/api/v1/workflows?limit=250
    steps:
      - uses: actions/checkout@v4
      - name: Read workflow list with curl
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p automation-results
          if [ -z "${N8N_API_KEY:-}" ]; then
            printf '%s\n' '{"status":"FAIL","operation":"CURL_READ_ONLY_PREFLIGHT","error":"N8N_API_KEY secret is empty or unavailable"}' > automation-results/n8n-preflight.json
            exit 1
          fi
          http_code="$(curl --http1.1 --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 5 --connect-timeout 20 --max-time 120 -A 'CHEMODAN-SAFE-PREFLIGHT/1.0' -H "X-N8N-API-KEY: ${N8N_API_KEY}" -H 'Accept: application/json' -o /tmp/n8n.json -w '%{http_code}' "${N8N_URL}" || true)"
          python3 - "$http_code" <<'PY'
          import json,sys
          code=sys.argv[1]
          try:
              payload=json.load(open('/tmp/n8n.json',encoding='utf-8'))
          except Exception:
              payload={}
          if code!='200':
              report={'status':'FAIL','operation':'CURL_READ_ONLY_PREFLIGHT','http_code':code,'error':'n8n API did not return HTTP 200'}
          else:
              items=payload.get('data',[]) if isinstance(payload,dict) else []
              matches=[w for w in items if 'CHEMODAN NEWS V5.3.3 BRANDED MEDIA' in str(w.get('name',''))]
              report={'status':'PASS' if len(matches)==1 else 'FAIL','operation':'CURL_READ_ONLY_PREFLIGHT','http_code':code,'visible_workflow_count':len(items),'target_match_count':len(matches),'target_workflow_id':matches[0].get('id') if len(matches)==1 else None,'target_workflow_name':matches[0].get('name') if len(matches)==1 else None,'target_active':matches[0].get('active') if len(matches)==1 else None}
              if len(matches)!=1: report['error']='Expected exactly one visible V5.3.3 target workflow'
          open('automation-results/n8n-preflight.json','w',encoding='utf-8').write(json.dumps(report,ensure_ascii=False,indent=2)+'\n')
          if report['status']!='PASS': raise SystemExit(1)
          PY
      - name: Commit preflight report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -f automation-results/n8n-preflight.json || exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation-results/n8n-preflight.json
          git diff --cached --quiet && exit 0
          git commit -m "Record curl n8n API preflight"
          git push

  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Validate and extract media archive
        shell: bash
        run: |
          set -euo pipefail
          test -f CHEMODAN_MEDIA_LIBRARY_V3_PUBLIC.zip
          unzip -t CHEMODAN_MEDIA_LIBRARY_V3_PUBLIC.zip
          rm -rf public
          mkdir -p public
          unzip -q CHEMODAN_MEDIA_LIBRARY_V3_PUBLIC.zip -d public
          test -d public/CHEMODAN_MEDIA_LIBRARY_V3
          jpg_count="$(find public/CHEMODAN_MEDIA_LIBRARY_V3 -type f -name '*.jpg' | wc -l | tr -d ' ')"
          test "$jpg_count" = "32"
          forbidden_count="$(find public -type f \( -name '*.json' -o -name '*.env' -o -name '*.key' -o -name '*.pem' \) | wc -l | tr -d ' ')"
          test "$forbidden_count" = "0"
          touch public/.nojekyll
      - name: Publish verified files to gh-pages branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd public
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add --all
          git commit -m "Publish verified CHEMODAN media library"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
