name: Publish CHEMODAN media library

on:
  push:
    branches:
      - main
    paths:
      - CHEMODAN_MEDIA_LIBRARY_V3_PUBLIC.zip
      - .github/workflows/publish-media.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: chemodan-media-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate and extract media archive
        shell: bash
        run: |
          set -euo pipefail
          test -f CHEMODAN_MEDIA_LIBRARY_V3_PUBLIC.zip
          unzip -t CHEMODAN_MEDIA_LIBRARY_V3_PUBLIC.zip
          rm -rf public
          mkdir -p public
          unzip -q CHEMODAN_MEDIA_LIBRARY_V3_PUBLIC.zip -d public
          test -d public/CHEMODAN_MEDIA_LIBRARY_V3
          jpg_count="$(find public/CHEMODAN_MEDIA_LIBRARY_V3 -type f -name '*.jpg' | wc -l | tr -d ' ')"
          test "$jpg_count" = "32"
          forbidden_count="$(find public -type f \( -name '*.json' -o -name '*.env' -o -name '*.key' -o -name '*.pem' \) | wc -l | tr -d ' ')"
          test "$forbidden_count" = "0"
          touch public/.nojekyll
          echo "Validated JPG files: $jpg_count"

      - name: Publish verified files to gh-pages branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd public
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add --all
          git commit -m "Publish verified CHEMODAN media library"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages

  n8n-v5-3-4-safe-patch:
    runs-on: ubuntu-latest
    env:
      N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
      N8N_BASE: https://hot-tours-bot.app.n8n.cloud/api/v1
      REPORT: automation-results/n8n-v5.3.4-patch-result.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply atomic safe patch and verify
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/apply_n8n_v534_patch.py

      - name: Commit patch report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          [ -f "$REPORT" ] || exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$REPORT"
          git diff --cached --quiet && exit 0
          git commit -m "Record n8n V5.3.4 safe patch result"
          git push origin main
