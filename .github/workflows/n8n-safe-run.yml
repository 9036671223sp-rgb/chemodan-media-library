name: Safe n8n run probe
on:
  push:
    branches: [main]
    paths: ['.github/workflows/n8n-safe-run.yml']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Probe run endpoints
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p automation-results
          body='{"triggerToStartFrom":{"name":"01 START | ручной запуск OFF"}}'
          a=$(curl -sS -o /tmp/a -w '%{http_code}' -X POST -H "X-N8N-API-KEY: $N8N_API_KEY" -H 'Content-Type: application/json' --data "$body" 'https://hot-tours-bot.app.n8n.cloud/api/v1/workflows/iMagZs46gwN9Q0rZ/run' || true)
          b=$(curl -sS -o /tmp/b -w '%{http_code}' -X POST -H "X-N8N-API-KEY: $N8N_API_KEY" -H 'Content-Type: application/json' --data "$body" 'https://hot-tours-bot.app.n8n.cloud/rest/workflows/iMagZs46gwN9Q0rZ/run' || true)
          python3 - "$a" "$b" <<'PY'
          import json,sys
          def read(p):
              try:return open(p,encoding='utf-8').read()[:500]
              except:return ''
          r={'operation':'SAFE_RUN_PROBE','api_v1_http':sys.argv[1],'api_v1_response':read('/tmp/a'),'rest_http':sys.argv[2],'rest_response':read('/tmp/b')}
          open('automation-results/n8n-safe-run-probe.json','w',encoding='utf-8').write(json.dumps(r,ensure_ascii=False,indent=2)+'\n')
          PY
      - name: Save report
        if: always()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add automation-results/n8n-safe-run-probe.json
          git diff --cached --quiet || (git commit -m 'Record safe n8n run probe' && git push)
