name: Create one-shot EF test workflow
# trigger-retry: 3
on:
  push:
    branches: [main]
    paths: ['.github/workflows/create-one-shot-ef-test.yml']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  create_test:
    runs-on: ubuntu-latest
    env:
      N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
      N8N_BASE: https://hot-tours-bot.app.n8n.cloud/api/v1
      SOURCE_ID: iMagZs46gwN9Q0rZ
      REPORT: automation-results/one-shot-ef-test.json
    steps:
      - uses: actions/checkout@v4
      - name: Create inactive EF-only one-shot clone
        shell: bash
        run: |
          set -u
          mkdir -p automation-results
          python3 <<'PY'
          import json, os, urllib.request, urllib.parse, urllib.error
          report=os.environ['REPORT']; out={'status':'FAIL','operation':'CREATE_ONE_SHOT_EF_TEST'}
          try:
              base=os.environ['N8N_BASE']; key=os.environ['N8N_API_KEY']; src=os.environ['SOURCE_ID']
              def api(method,path,payload=None):
                  data=None; h={'X-N8N-API-KEY':key,'Accept':'application/json'}
                  if payload is not None: data=json.dumps(payload,ensure_ascii=False).encode(); h['Content-Type']='application/json'
                  req=urllib.request.Request(base+path,data=data,method=method,headers=h)
                  try:
                      with urllib.request.urlopen(req,timeout=90) as r:
                          raw=r.read().decode(); return json.loads(raw) if raw else {}
                  except urllib.error.HTTPError as e:
                      body=e.read().decode('utf-8','replace')[:1500]
                      raise RuntimeError(f'{method} {path} HTTP {e.code}: {body}') from e
              w=api('GET',f'/workflows/{src}')
              assert w.get('active') is False and len(w.get('nodes',[]))==44
              assert not any('scheduletrigger' in str(n.get('type','')).lower() or 'webhook' in str(n.get('type','')).lower() for n in w['nodes'])
              name='CHEMODAN NEWS V5.3.4 — ONE SHOT EF TEST — MANUAL INACTIVE'
              def node(nm): return next(n for n in w['nodes'] if n.get('name')==nm)
              s=node('02 SETTINGS | безопасность и параметры')['parameters']['jsCode']
              s=s.replace('workflow_name: "CHEMODAN NEWS V5.3.4 BRANDED MEDIA — PICKER FIXED — SAFE MANUAL NO SEND",',f'workflow_name: "{name}",',1)
              s=s.replace('workflow_version: "V5.3.4_BRANDED_MEDIA_PICKER_FIXED_SAFE_MANUAL_NO_SEND",','workflow_version: "V5.3.4_ONE_SHOT_EF_TEST_MANUAL_INACTIVE",',1)
              s=s.replace('owner_gate_approved: false,','owner_gate_approved: true,',1)
              s=s.replace('final_publication_approved: false,','final_publication_approved: true,',1)
              s=s.replace('media_send_enabled: false,','media_send_enabled: true,',1)
              node('02 SETTINGS | безопасность и параметры')['parameters']['jsCode']=s
              g=node('18 MEDIA GUARD | V5.3 sendPhoto safety gate')['parameters']['jsCode']
              marker="  const target = txt(row.target_channel);"
              g=g.replace(marker,"  if (channelKey !== 'EF') return block(row, 'ONE_SHOT_TEST_EF_ONLY');\n"+marker,1)
              node('18 MEDIA GUARD | V5.3 sendPhoto safety gate')['parameters']['jsCode']=g
              payload={'name':name,'nodes':w['nodes'],'connections':w.get('connections',{}),'settings':w.get('settings',{})}
              listed=api('GET','/workflows?name='+urllib.parse.quote(name))
              matches=[x for x in listed.get('data',[]) if x.get('name')==name]
              test=api('PUT',f"/workflows/{matches[0]['id']}",payload) if len(matches)==1 else api('POST','/workflows',payload)
              full=api('GET',f"/workflows/{test['id']}")
              allcode='\n'.join(str(n.get('parameters',{}).get('jsCode','')) for n in full.get('nodes',[]))
              out={'status':'PASS','operation':'CREATE_ONE_SHOT_EF_TEST','workflow_id':full.get('id'),'workflow_name':full.get('name'),'active':full.get('active'),'node_count':len(full.get('nodes',[])),'schedule_trigger_count':sum('scheduletrigger' in str(n.get('type','')).lower() for n in full.get('nodes',[])),'webhook_count':sum('webhook' in str(n.get('type','')).lower() for n in full.get('nodes',[])),'ef_only_guard':"ONE_SHOT_TEST_EF_ONLY" in allcode,'three_gates_enabled':all(x in allcode for x in ['owner_gate_approved: true','final_publication_approved: true','media_send_enabled: true'])}
              assert out['active'] is False and out['node_count']==44 and out['schedule_trigger_count']==0 and out['webhook_count']==0 and out['ef_only_guard'] and out['three_gates_enabled']
          except Exception as e:
              out['error']=str(e); out['error_type']=type(e).__name__
          open(report,'w',encoding='utf-8').write(json.dumps(out,ensure_ascii=False,indent=2)+'\n')
          if out['status']!='PASS': raise SystemExit(1)
          PY
      - name: Save report
        if: always()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add automation-results/one-shot-ef-test.json
          git diff --cached --quiet || (git commit -m 'Record one-shot EF test workflow' && git push)
